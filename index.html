<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Ritual</title>
<link rel="icon" href="icon.png"/>
<link rel="apple-touch-icon" href="icon.png"/>
<meta name="theme-color" content="#f5f3f0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Ritual"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Playfair+Display:ital@0;1&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

html,body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f0edf5;
  color:#1a1520;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  min-height:100vh;
}
button,input,textarea{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif}

/* ── layout ── */
#app{max-width:430px;margin:0 auto;padding:0 20px 110px;min-height:100vh}
.screen{display:none}.screen.active{display:block}

/* ── onboarding ── */
#ob-wrap{
  min-height:100vh;
  background:linear-gradient(160deg,#f5f0fc 0%,#ede8f5 50%,#e8e2f0 100%);
  display:flex;align-items:center;justify-content:center;padding:24px
}
.ob-card{
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(20px);
  border-radius:32px;padding:40px 32px;
  width:100%;max-width:360px;
  border:1px solid rgba(255,255,255,.8);
  box-shadow:0 8px 48px rgba(120,80,160,.12),0 2px 8px rgba(0,0,0,.04)
}
.ob-eyebrow{
  font-size:10px;font-weight:700;color:#9b7fa6;
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px
}
.ob-eyebrow::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#d8c8e8,transparent)}
.ob-title{font-size:28px;font-weight:800;color:#1a1520;line-height:1.15;margin-bottom:10px}
.ob-sub{font-size:15px;color:#8a7890;line-height:1.6;margin-bottom:32px}
.ob-habit-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  background:linear-gradient(135deg,#faf8fd,#f5f0fa);
  border-radius:18px;margin-bottom:8px;cursor:pointer;
  transition:all .2s;
  border:1.5px solid rgba(155,127,166,.1);
  box-shadow:0 1px 3px rgba(0,0,0,.04)
}
.ob-habit-row:hover,.ob-habit-row:active{
  background:linear-gradient(135deg,#f0eaf8,#ebe0f5);
  border-color:rgba(155,127,166,.3);
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(120,80,160,.1)
}
.ob-habit-emoji{font-size:24px;flex-shrink:0}
.ob-habit-label{flex:1;font-size:15px;font-weight:600;color:#1a1520}
.ob-habit-edit{font-size:10px;font-weight:700;color:#c0b0d0;letter-spacing:.08em;text-transform:uppercase}

/* ── form elements ── */
.field-wrap{margin-bottom:22px}
.field-label{
  font-size:10px;font-weight:700;color:#9b7fa6;
  letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;
  display:flex;align-items:center;gap:6px
}
.field-input{
  width:100%;
  background:linear-gradient(135deg,#faf8fd,#f7f3fb);
  border:1.5px solid rgba(155,127,166,.2);
  border-radius:16px;padding:15px 18px;font-size:16px;color:#1a1520;
  outline:none;transition:all .2s;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.04)
}
.field-input:focus{
  border-color:#9b7fa6;
  box-shadow:0 0 0 4px rgba(155,127,166,.12),inset 0 1px 3px rgba(0,0,0,.04)
}
.field-input::placeholder{color:#c8bcd4}
textarea.field-input{resize:none;min-height:90px;line-height:1.6}
.prefix-row{
  display:flex;align-items:center;
  background:linear-gradient(135deg,#faf8fd,#f7f3fb);
  border:1.5px solid rgba(155,127,166,.2);
  border-radius:16px;overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.04);
  transition:all .2s
}
.prefix-row:focus-within{
  border-color:#9b7fa6;
  box-shadow:0 0 0 4px rgba(155,127,166,.12),inset 0 1px 3px rgba(0,0,0,.04)
}
.prefix-sign{padding:15px 6px 15px 18px;font-size:16px;color:#9b7fa6;font-weight:700}
.prefix-input{flex:1;background:transparent;border:none;padding:15px 18px 15px 4px;font-size:16px;color:#1a1520;outline:none}

/* ── buttons ── */
.btn{
  width:100%;padding:17px;border-radius:16px;border:none;
  font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;
  letter-spacing:.01em;position:relative;overflow:hidden
}
.btn-primary{
  background:linear-gradient(135deg,#a888b5 0%,#8b6a9a 50%,#7a5889 100%);
  color:#fff;
  box-shadow:0 4px 16px rgba(120,80,160,.3),0 1px 3px rgba(0,0,0,.1);
}
.btn-primary:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(120,80,160,.35),0 2px 6px rgba(0,0,0,.1)
}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{
  background:linear-gradient(135deg,#d0c8dc,#c4b8d0);
  box-shadow:none;cursor:default;transform:none
}
.btn-ghost{
  background:rgba(155,127,166,.1);color:#8a7890;margin-top:10px;
  border:1.5px solid rgba(155,127,166,.15)
}
.btn-ghost:hover{background:rgba(155,127,166,.18)}
.btn-sm{
  padding:11px 22px;width:auto;border-radius:14px;
  border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s
}
.btn-sm-primary{
  background:linear-gradient(135deg,#a888b5,#8b6a9a);color:#fff;
  box-shadow:0 3px 12px rgba(120,80,160,.28)
}
.btn-sm-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(120,80,160,.32)}
.btn-sm-ghost{background:rgba(155,127,166,.1);color:#8a7890;border:1.5px solid rgba(155,127,166,.15)}
.btn-sm-ghost:hover{background:rgba(155,127,166,.18)}

/* ── emoji picker ── */
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 20px}
.emoji-opt{
  width:44px;height:44px;border-radius:14px;border:2px solid transparent;
  background:linear-gradient(135deg,#faf8fd,#f5f0fa);
  font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.05)
}
.emoji-opt.sel{
  border-color:#9b7fa6;
  background:linear-gradient(135deg,#f0e8f8,#e8daf2);
  box-shadow:0 2px 8px rgba(155,127,166,.25)
}
.emoji-opt:hover{transform:scale(1.1)}

/* ── top nav ── */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:28px 0 18px;position:sticky;top:0;
  background:linear-gradient(#f0edf5 85%,rgba(240,237,245,0));
  z-index:10
}
.greeting-name{font-size:24px;font-weight:800;color:#1a1520;letter-spacing:-.3px}
.greeting-sub{font-size:13px;color:#9888a8;font-weight:500;margin-top:3px}
.nav-right{display:flex;align-items:center;gap:8px}
.tab-pills{
  display:flex;gap:4px;
  background:rgba(255,255,255,.7);
  border-radius:22px;padding:4px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.06)
}
.tab-pill{
  padding:7px 16px;border-radius:18px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
  background:transparent;color:#9888a8;transition:all .2s
}
.tab-pill.active{
  background:linear-gradient(135deg,#a888b5,#8b6a9a);
  color:#fff;
  box-shadow:0 2px 8px rgba(120,80,160,.3)
}
.icon-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:rgba(255,255,255,.85);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s
}
.icon-btn:hover{background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.1)}

/* ── week nav ── */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.week-nav-arrow{
  width:42px;height:42px;border-radius:14px;border:none;
  background:rgba(255,255,255,.85);font-size:18px;color:#9b7fa6;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s
}
.week-nav-arrow:hover{background:#fff;transform:scale(1.05);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.week-nav-arrow:disabled{opacity:.25;cursor:default;transform:none}
.week-label-big{font-size:16px;font-weight:700;color:#1a1520;text-align:center}
.week-label-small{font-size:11px;font-weight:600;color:#b0a0c0;text-align:center;margin-top:3px;letter-spacing:.04em}

/* ── progress card ── */
.progress-card{
  background:linear-gradient(145deg,#b896c4 0%,#9b7fa6 30%,#7d6289 70%,#6a5278 100%);
  border-radius:28px;padding:28px 26px 24px;margin-bottom:18px;
  position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(100,60,140,.28),0 2px 8px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.2)
}
.progress-card::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='80' cy='20' r='60' fill='none' stroke='rgba(255,255,255,0.06)' stroke-width='1'/%3E%3Ccircle cx='80' cy='20' r='40' fill='none' stroke='rgba(255,255,255,0.05)' stroke-width='1'/%3E%3C/svg%3E") no-repeat right -20px top -20px;
  background-size:260px 260px;pointer-events:none
}
.progress-card::after{
  content:'';position:absolute;bottom:-60px;left:-20px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.07),transparent 70%);
  pointer-events:none
}
.progress-eyebrow{
  font-size:10px;font-weight:700;color:rgba(255,255,255,.55);
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:16px;
  display:flex;align-items:center;gap:8px
}
.progress-eyebrow::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.15)}
.progress-score{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.progress-num{
  font-size:64px;font-weight:800;color:#fff;line-height:1;
  text-shadow:0 2px 12px rgba(0,0,0,.2);letter-spacing:-2px
}
.progress-denom{font-size:28px;font-weight:500;color:rgba(255,255,255,.45)}
.progress-status{
  font-size:15px;color:rgba(255,255,255,.85);font-weight:500;
  margin-bottom:22px;letter-spacing:.01em
}
.progress-track{
  height:6px;
  background:rgba(255,255,255,.18);
  border-radius:6px;overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.1)
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,rgba(255,255,255,.7),#fff);
  border-radius:6px;
  transition:width .7s cubic-bezier(.4,0,.2,1);
  box-shadow:0 1px 4px rgba(255,255,255,.4)
}

/* ── nudge banner ── */
.nudge{
  background:linear-gradient(135deg,#fff8f0,#fff3e8);
  border:1.5px solid rgba(224,120,48,.2);
  border-radius:22px;padding:16px 20px;margin-bottom:18px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 16px rgba(224,120,48,.1),0 1px 3px rgba(0,0,0,.04)
}
.nudge-text{font-size:14px;font-weight:700;color:#9a5020}
.nudge-sub{font-size:12px;color:#c07840;margin-top:3px}
.nudge-badge{
  background:linear-gradient(135deg,#f08040,#d06020);
  border-radius:14px;padding:8px 14px;
  text-align:center;flex-shrink:0;
  box-shadow:0 3px 10px rgba(200,80,20,.3)
}
.nudge-badge-num{font-size:22px;font-weight:800;color:#fff;line-height:1}
.nudge-badge-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:.06em;text-transform:uppercase}

/* ── day strip ── */
.day-strip{display:flex;gap:7px;margin-bottom:26px}
.day-cell{
  flex:1;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(10px);
  border-radius:18px;padding:11px 4px 10px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  border:1.5px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.03);
  transition:all .2s
}
.day-cell.today{
  background:linear-gradient(145deg,#f0e8f8,#e8d8f0);
  border-color:rgba(155,127,166,.4);
  box-shadow:0 4px 16px rgba(155,127,166,.2),0 1px 3px rgba(0,0,0,.05)
}
.day-letter{font-size:10px;font-weight:700;color:#c0b0d0;letter-spacing:.06em}
.day-cell.today .day-letter{color:#9b7fa6}
.day-num{font-size:16px;font-weight:800;color:#1a1520}
.day-cell.today .day-num{color:#7d6289}
.day-dot{
  width:5px;height:5px;border-radius:50%;
  background:linear-gradient(135deg,#b898c8,#9b7fa6);
  opacity:0;transition:opacity .3s;
  box-shadow:0 1px 3px rgba(155,127,166,.5)
}
.day-dot.vis{opacity:1}

/* ── section label ── */
.section-label{
  font-size:10px;font-weight:700;color:#b0a0c0;
  letter-spacing:.14em;text-transform:uppercase;
  margin:4px 0 14px;
  display:flex;align-items:center;gap:10px
}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(155,127,166,.2),transparent)}

/* ── habit cards ── */
.habit-stack{display:flex;flex-direction:column;gap:12px;margin-bottom:30px}
.hcard{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(20px);
  border-radius:24px;overflow:hidden;
  border:1px solid rgba(255,255,255,.95);
  box-shadow:0 4px 20px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  transition:all .25s
}
.hcard:hover{
  box-shadow:0 8px 32px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05);
  transform:translateY(-1px)
}
.hcard.done{opacity:.8}
.hcard-top{
  display:flex;align-items:center;
  padding:20px 20px 20px 22px;gap:15px
}
.hcard-emoji{
  font-size:28px;flex-shrink:0;line-height:1;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.12))
}
.hcard-info{flex:1;min-width:0}
.hcard-name{
  font-size:16px;font-weight:700;color:#1a1520;
  display:flex;align-items:center;gap:8px;
  letter-spacing:-.1px
}
.hcard.done .hcard-name-text{color:#c0b0d0;text-decoration:line-through;text-decoration-color:#d8c8e8}
.hcard-sub{font-size:12px;color:#b0a0c0;font-weight:500;margin-top:4px;letter-spacing:.01em}
.hcard-sub .streak{
  color:#9b7fa6;font-weight:700;
  background:rgba(155,127,166,.1);
  padding:1px 6px;border-radius:6px;font-size:11px
}
.edit-habit-btn{
  background:none;border:none;cursor:pointer;
  font-size:13px;color:#d0c0e0;padding:3px 5px;
  border-radius:8px;transition:all .15s;flex-shrink:0
}
.edit-habit-btn:hover{color:#9b7fa6;background:rgba(155,127,166,.1)}
.check-btn{
  width:34px;height:34px;border-radius:50%;
  border:2.5px solid #e0d0ec;background:transparent;
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.04)
}
.check-btn:hover:not(.checked){border-color:#9b7fa6;background:rgba(155,127,166,.08)}
.check-btn.checked{
  background:linear-gradient(135deg,#b898c8,#9b7fa6);
  border-color:transparent;
  box-shadow:0 3px 10px rgba(155,127,166,.4)
}
.check-icon{opacity:0;transform:scale(0);transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.check-btn.checked .check-icon{opacity:1;transform:scale(1)}

.hcard-bottom{
  border-top:1px solid rgba(155,127,166,.08);
  padding:13px 22px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;cursor:pointer;min-height:48px;
  background:linear-gradient(135deg,rgba(250,248,253,.8),rgba(248,244,252,.8));
  transition:background .15s
}
.hcard-bottom:hover{background:linear-gradient(135deg,rgba(245,240,252,.9),rgba(240,232,250,.9))}
.hcard-note-text{
  font-size:13px;color:#6a5870;line-height:1.45;flex:1;
  font-style:italic
}
.hcard-note-add{font-size:13px;color:#c8b8d8;font-weight:500;transition:color .15s}
.hcard-bottom:hover .hcard-note-add{color:#9b7fa6}
.hcard-note-action{
  font-size:10px;color:#c8b8d8;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;
  background:rgba(155,127,166,.1);
  padding:4px 10px;border-radius:8px
}

/* ── reading nights ── */
.nights-wrap{
  border-top:1px solid rgba(155,127,166,.08);
  padding:16px 22px 18px;
  background:linear-gradient(135deg,rgba(250,248,253,.6),rgba(248,244,252,.6))
}
.nights-grid{display:flex;gap:6px}
.night-btn{
  flex:1;height:38px;border-radius:12px;
  border:2px solid rgba(155,127,166,.15);
  background:rgba(255,255,255,.7);
  cursor:pointer;font-size:11px;font-weight:700;color:#c0b0d0;
  transition:all .2s;letter-spacing:.04em
}
.night-btn:hover:not(.on){border-color:rgba(155,127,166,.3);color:#9b7fa6}
.night-btn.on{
  border-color:transparent;
  background:linear-gradient(135deg,#b898c8,#9b7fa6);
  color:#fff;
  box-shadow:0 2px 8px rgba(155,127,166,.3)
}
.nights-count{font-size:13px;color:#9888a8;font-weight:600}
.nights-count span{color:#9b7fa6;font-weight:800}

/* ── reading book row ── */
.reading-book{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.8);
  border-radius:14px;padding:11px 16px;
  cursor:pointer;
  border:1.5px solid rgba(155,127,166,.15);
  box-shadow:0 1px 4px rgba(0,0,0,.04);
  transition:all .2s
}
.reading-book:hover{
  border-color:rgba(155,127,166,.35);
  box-shadow:0 3px 10px rgba(155,127,166,.12);
  transform:translateY(-1px)
}
.reading-book-emoji{font-size:20px;flex-shrink:0}
.reading-book-title{flex:1;font-size:14px;font-weight:600;color:#1a1520}
.reading-book-edit{font-size:10px;font-weight:700;color:#c8b8d8;letter-spacing:.08em;text-transform:uppercase}

/* ── star rating ── */
.stars-row{display:flex;gap:2px}
.star-btn{
  background:none;border:none;cursor:pointer;
  font-size:24px;color:#e0d0ec;transition:all .15s;padding:0;line-height:1
}
.star-btn.lit{color:#f0a030;filter:drop-shadow(0 1px 3px rgba(240,160,48,.4))}
.star-btn:hover{color:#f0a030;transform:scale(1.15)}

/* ── spending ── */
.spend-wrap{
  border-top:1px solid rgba(155,127,166,.08);
  padding:16px 22px 18px;
  background:linear-gradient(135deg,rgba(250,248,253,.6),rgba(248,244,252,.6))
}
.spend-amt-row{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.spend-amt{font-size:32px;font-weight:800;line-height:1;letter-spacing:-1px}
.spend-amt.ok{color:#9b7fa6}
.spend-amt.warn{color:#d08840}
.spend-amt.over{color:#c04848}
.spend-budget{font-size:15px;color:#b0a0c0;font-weight:600}
.spend-via{
  font-size:10px;color:#c8b8d8;font-weight:700;margin-left:auto;
  background:rgba(155,127,166,.1);padding:3px 8px;border-radius:8px;
  letter-spacing:.06em;text-transform:uppercase
}
.spend-bar-track{
  height:7px;background:rgba(155,127,166,.12);
  border-radius:7px;overflow:hidden;margin-bottom:10px;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.06)
}
.spend-bar-fill{height:100%;border-radius:7px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.spend-bar-fill.ok{background:linear-gradient(90deg,#b898c8,#9b7fa6)}
.spend-bar-fill.over{background:linear-gradient(90deg,#e07070,#c04848)}
.spend-status{font-size:13px;font-weight:700;letter-spacing:.01em}
.spend-status.ok{color:#9b7fa6}
.spend-status.over{color:#c04848}
.spend-status.warn{color:#d08840}
.spend-manual{display:flex;gap:8px;margin-top:14px}
.spend-manual input{
  flex:1;
  background:rgba(255,255,255,.8);
  border:1.5px solid rgba(155,127,166,.2);
  border-radius:13px;padding:11px 15px;font-size:14px;color:#1a1520;outline:none;
  transition:all .2s
}
.spend-manual input:focus{border-color:#9b7fa6;box-shadow:0 0 0 3px rgba(155,127,166,.12)}
.spend-manual button{
  background:linear-gradient(135deg,#b898c8,#9b7fa6);color:#fff;border:none;
  border-radius:13px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;
  box-shadow:0 2px 8px rgba(155,127,166,.3);transition:all .2s
}
.spend-manual button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(155,127,166,.35)}

/* ── memory card ── */
.memory-card{
  background:linear-gradient(145deg,#f0e8f8,#e8daf0);
  border-radius:24px;padding:20px 22px;margin-bottom:30px;
  border:1px solid rgba(155,127,166,.15);
  box-shadow:0 4px 16px rgba(155,127,166,.1)
}
.memory-item{display:flex;gap:13px;margin-bottom:12px}
.memory-item:last-child{margin-bottom:0}
.memory-emoji{font-size:20px;flex-shrink:0;margin-top:1px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.1))}
.memory-text{font-size:13px;color:#5a4868;line-height:1.55;flex:1}
.memory-habit{font-weight:700;color:#7d6289}

/* ── history stats ── */
.stat-strip{display:flex;gap:10px;margin-bottom:22px}
.stat-card{
  flex:1;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(10px);
  border-radius:22px;padding:18px 16px 16px;
  border:1px solid rgba(255,255,255,.95);
  box-shadow:0 4px 16px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04)
}
.stat-val{
  font-size:34px;font-weight:800;color:#1a1520;line-height:1;
  letter-spacing:-1px
}
.stat-lbl{
  font-size:10px;font-weight:700;color:#b0a0c0;
  letter-spacing:.1em;text-transform:uppercase;margin-top:6px
}

/* ── history list ── */
.hist-list{display:flex;flex-direction:column;gap:8px}
.hist-row{
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:14px 18px;display:flex;align-items:center;gap:12px;
  border:1.5px solid rgba(255,255,255,.95);
  box-shadow:0 2px 10px rgba(0,0,0,.05);cursor:pointer;
  transition:all .2s
}
.hist-row:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(0,0,0,.08);
  border-color:rgba(155,127,166,.2)
}
.hist-row.current{border-color:rgba(155,127,166,.4);background:rgba(245,240,252,.9)}
.hist-date{font-size:12px;font-weight:700;color:#9888a8;width:74px;flex-shrink:0}
.hist-pips{display:flex;gap:5px;flex:1}
.hist-pip{
  width:32px;height:32px;border-radius:11px;
  background:rgba(155,127,166,.07);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:all .2s
}
.hist-pip.done{background:rgba(155,127,166,.15)}
.hist-pip.perfect{
  background:linear-gradient(135deg,#b898c8,#9b7fa6);
  box-shadow:0 2px 6px rgba(155,127,166,.3)
}
.hist-score{font-size:13px;font-weight:800;color:#c0b0d0;width:30px;text-align:right;letter-spacing:-.3px}
.hist-score.full{color:#9b7fa6}

/* ── sheets / modals ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(10,5,20,.4);
  backdrop-filter:blur(4px);
  z-index:100;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;transition:opacity .25s;pointer-events:none
}
.overlay.open{opacity:1;pointer-events:all}
.sheet{
  background:#fff;
  border-radius:32px 32px 0 0;
  width:100%;max-width:430px;padding:0 26px 52px;
  max-height:90vh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,0,.67,0);
  box-shadow:0 -8px 40px rgba(0,0,0,.12)
}
.overlay.open .sheet{transform:translateY(0);transition:transform .38s cubic-bezier(.33,1,.68,1)}
.sheet-bg{
  background:linear-gradient(160deg,#f5f0fc,#ede8f5);
}
.sheet-handle{
  width:44px;height:5px;
  background:linear-gradient(90deg,#d8c8e8,#c8b8d8);
  border-radius:3px;margin:18px auto 26px
}
.sheet-title{font-size:22px;font-weight:800;color:#1a1520;margin-bottom:6px;letter-spacing:-.3px}
.sheet-sub{font-size:14px;color:#9888a8;margin-bottom:26px;line-height:1.5}

/* ── timeline ── */
.tl-item{display:flex;gap:14px;margin-bottom:14px}
.tl-dot{
  width:12px;height:12px;border-radius:50%;
  background:linear-gradient(135deg,#b898c8,#9b7fa6);
  flex-shrink:0;margin-top:3px;
  box-shadow:0 2px 6px rgba(155,127,166,.35)
}
.tl-card{
  flex:1;
  background:rgba(255,255,255,.9);
  border-radius:18px;padding:14px 17px;
  border:1.5px solid rgba(155,127,166,.12);
  box-shadow:0 2px 8px rgba(0,0,0,.04)
}
.tl-week{
  font-size:10px;font-weight:700;color:#b0a0c0;
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px
}
.tl-note{font-size:14px;color:#1a1520;line-height:1.55;font-style:italic}
.tl-empty{font-size:13px;color:#c8b8d8;font-style:italic}
.tl-field{font-size:14px;color:#1a1520;margin-bottom:5px;line-height:1.4}
.tl-field:last-child{margin-bottom:0}
.tl-flabel{
  font-size:10px;font-weight:700;color:#b0a0c0;
  letter-spacing:.08em;text-transform:uppercase;margin-right:8px;
  background:rgba(155,127,166,.1);padding:2px 7px;border-radius:6px
}

/* ── confetti ── */
.confetti-piece{position:fixed;top:-10px;border-radius:3px;pointer-events:none;z-index:200}
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  80%{opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* ── celebration toast ── */
.celebrate-toast{
  position:fixed;left:50%;transform:translateX(-50%) scale(.8) translateY(20px);
  bottom:110px;z-index:201;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(20px);
  border-radius:28px;padding:22px 32px;
  border:1px solid rgba(255,255,255,.9);
  box-shadow:0 16px 60px rgba(100,60,140,.2),0 4px 12px rgba(0,0,0,.08);
  text-align:center;
  opacity:0;transition:all .45s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;white-space:nowrap
}
.celebrate-toast.show{opacity:1;transform:translateX(-50%) scale(1) translateY(0)}
.celebrate-emoji{font-size:36px;margin-bottom:8px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.15))}
.celebrate-title{font-size:18px;font-weight:800;color:#1a1520;letter-spacing:-.2px}
.celebrate-sub{font-size:13px;color:#9888a8;margin-top:4px;font-weight:500}

/* ── animations ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.fade-up{animation:fadeUp .35s cubic-bezier(.33,1,.68,1) both}

@keyframes popIn{
  0%{transform:scale(.9);opacity:0}
  60%{transform:scale(1.02)}
  100%{transform:scale(1);opacity:1}
}
.pop-in{animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both}
</style>
</head>
<body>

<!-- ══ ONBOARDING ══════════════════════════════════════════════════════════ -->
<div id="ob-wrap">
  <div class="ob-card" id="ob-card">
    <!-- steps injected by JS -->
  </div>
</div>

<!-- ══ MAIN APP ════════════════════════════════════════════════════════════ -->
<div id="app" style="display:none">
  <div id="topbar">
    <div>
      <div class="greeting-name" id="greeting-name"></div>
      <div class="greeting-sub" id="greeting-sub"></div>
    </div>
    <div class="nav-right">
      <div class="tab-pills">
        <button class="tab-pill active" id="tab-weekly" onclick="switchTab('weekly')">Weekly</button>
        <button class="tab-pill" id="tab-history" onclick="switchTab('history')">History</button>
      </div>
      <button class="icon-btn" onclick="openSheet('settings-sheet')" title="Settings">⚙️</button>
    </div>
  </div>

  <!-- Week nav (shared) -->
  <div class="week-nav">
    <button class="week-nav-arrow" id="wk-prev" onclick="changeWeek(-1)">←</button>
    <div>
      <div class="week-label-big" id="wk-label"></div>
      <div class="week-label-small" id="wk-sub"></div>
    </div>
    <button class="week-nav-arrow" id="wk-next" onclick="changeWeek(1)">→</button>
  </div>

  <!-- Weekly screen -->
  <div class="screen active" id="screen-weekly">
    <div id="nudge-wrap"></div>
    <div class="progress-card" id="progress-card">
      <div class="progress-eyebrow">This week</div>
      <div class="progress-score">
        <div class="progress-num" id="prog-num">0</div>
        <div class="progress-denom" id="prog-denom">/6</div>
      </div>
      <div class="progress-status" id="prog-status">Not started</div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="day-strip" id="day-strip"></div>
    <div class="section-label">Habits</div>
    <div class="habit-stack" id="habit-stack"></div>
    <div id="memory-wrap"></div>
  </div>

  <!-- History screen -->
  <div class="screen" id="screen-history">
    <div class="stat-strip" id="stat-strip"></div>
    <div class="section-label" style="margin-bottom:12px">Last 12 weeks</div>
    <div class="hist-list" id="hist-list"></div>
  </div>
</div>

<!-- ══ OVERLAYS ═══════════════════════════════════════════════════════════ -->

<!-- Log note -->
<div class="overlay" id="log-sheet" onclick="handleOverlayClick(event,'log-sheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="log-sheet-content"></div>
  </div>
</div>

<!-- Date timeline -->
<div class="overlay" id="timeline-sheet" onclick="handleOverlayClick(event,'timeline-sheet')">
  <div class="sheet sheet-bg">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="tl-title"></div>
    <div class="sheet-sub">Every date logged</div>
    <div id="tl-list"></div>
    <button class="btn btn-primary" style="margin-top:16px" id="tl-log-btn" onclick="openLogFromTimeline()">+ Log this week</button>
  </div>
</div>

<!-- Edit habit -->
<div class="overlay" id="edit-sheet" onclick="handleOverlayClick(event,'edit-sheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Edit habit</div>
    <div class="sheet-sub">Make it personal to you</div>
    <div class="field-wrap">
      <div class="field-label">Name</div>
      <input type="text" class="field-input" id="edit-label-input" placeholder="Habit name"/>
    </div>
    <div class="field-wrap">
      <div class="field-label">Emoji</div>
      <div class="emoji-grid" id="edit-emoji-grid"></div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn-sm btn-sm-ghost" onclick="closeSheet('edit-sheet')">Cancel</button>
      <button class="btn-sm btn-sm-primary" style="flex:1" onclick="saveEditHabit()">Save</button>
    </div>
  </div>
</div>

<!-- Settings -->
<div class="overlay" id="settings-sheet" onclick="handleOverlayClick(event,'settings-sheet')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Settings</div>
    <div class="field-wrap" style="margin-top:8px">
      <div class="field-label">Your name</div>
      <input type="text" class="field-input" id="settings-name" placeholder="Your name"/>
    </div>
    <div class="field-wrap">
      <div class="field-label">Weekly spending budget</div>
      <div class="prefix-row">
        <span class="prefix-sign">$</span>
        <input type="number" class="prefix-input" id="settings-budget" placeholder="500"/>
      </div>
    </div>
    <div class="field-wrap">
      <div class="field-label">Up Bank token <span style="color:#c0b8b0;font-weight:400;text-transform:none;letter-spacing:0;font-size:12px">(optional)</span></div>
      <input type="password" class="field-input" id="settings-token" placeholder="up:yeah:••••••••"/>
      <div style="font-size:12px;color:#8a8078;margin-top:6px;line-height:1.5">Up app → Settings → API → Create token. Read-only.</div>
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">Save</button>
  </div>
</div>

<!-- Confetti container -->
<div id="confetti-wrap" style="position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden"></div>
<div class="celebrate-toast" id="celebrate-toast">
  <div class="celebrate-emoji">🎉</div>
  <div class="celebrate-title" id="celebrate-title"></div>
  <div class="celebrate-sub" id="celebrate-sub"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// CONSTANTS & STATE
// ══════════════════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'ritual-v5';
const EMOJIS = ['💼','🍷','🍳','🤝','📚','💳','✨','🌿','🎨','🏃','🧘','🎵','🌍','💪','🎯','🌱'];
const DAY_LETTERS = ['M','T','W','T','F','S','S'];
const DEFAULT_HABITS = [
  {id:'career',   label:'Career conversation', prompt:'Who did you connect with?', emoji:'💼', type:'weekly', isDate:false},
  {id:'date',     label:'Date',                 prompt:'Who with & where?',          emoji:'🍷', type:'weekly', isDate:true},
  {id:'recipe',   label:'New recipe',           prompt:'What did you make?',         emoji:'🍳', type:'weekly', isDate:false},
  {id:'friends',  label:'Friends catch-up',     prompt:'Who did you see?',           emoji:'🤝', type:'weekly', isDate:false},
  {id:'reading',  label:'Reading',              prompt:'What are you reading?',      emoji:'📚', type:'nights', target:3, isDate:false},
  {id:'spending', label:'Under spending goal',  prompt:'Weekly budget',              emoji:'💳', type:'spending', isDate:false},
];

let state = null;
let currentWeek = getWeekKey();
let currentTab = 'weekly';
let loggingId = null;
let editingId = null;
let upSpend = null;

// ══════════════════════════════════════════════════════════════════════════════
// DATE HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function getWeekKey(d = new Date()) {
  const x = new Date(d); x.setHours(0,0,0,0);
  x.setDate(x.getDate() - ((x.getDay()+6)%7));
  return x.toISOString().slice(0,10);
}
function offsetWeek(wk, n) {
  const d = new Date(wk); d.setDate(d.getDate() + n*7);
  return d.toISOString().slice(0,10);
}
function weekDates(wk) {
  return Array.from({length:7}, (_,i) => {
    const d = new Date(wk); d.setDate(d.getDate()+i); return d;
  });
}
function fmtRange(wk) {
  const dates = weekDates(wk);
  const s = dates[0], e = dates[6];
  const mo = d => d.toLocaleDateString('en-AU',{month:'short'});
  return s.getMonth()===e.getMonth()
    ? `${mo(s)} ${s.getDate()}–${e.getDate()}`
    : `${mo(s)} ${s.getDate()} – ${mo(e)} ${e.getDate()}`;
}
function daysLeft() {
  const now = new Date(); now.setHours(0,0,0,0);
  const end = new Date(getWeekKey()); end.setDate(end.getDate()+6);
  return Math.max(0, Math.round((end-now)/86400000));
}

// ══════════════════════════════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════════════════════════════
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || null; }
  catch { return null; }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ══════════════════════════════════════════════════════════════════════════════
// HABIT LOGIC
// ══════════════════════════════════════════════════════════════════════════════
function getEntry(id, wk) { return (state.data[`${wk||currentWeek}:${id}`] || {}); }
function getNights(wk) { return state.data[`${wk||currentWeek}:reading:nights`] || []; }
function isHabitDone(id, wk) {
  wk = wk || currentWeek;
  const h = state.habits.find(x=>x.id===id);
  if (!h) return false;
  if (h.type==='nights') return getNights(wk).length >= (h.target||3);
  return !!(getEntry(id,wk).done);
}
function getStreak(id) {
  let s=0, wk=currentWeek;
  while (isHabitDone(id, wk)) { s++; wk=offsetWeek(wk,-1); }
  return s;
}
function totalDone(wk) {
  wk = wk || currentWeek;
  return state.habits.filter(h => isHabitDone(h.id, wk)).length;
}

// ══════════════════════════════════════════════════════════════════════════════
// ONBOARDING
// ══════════════════════════════════════════════════════════════════════════════
let obStep = 0;
let obName = '';
let obHabits = DEFAULT_HABITS.map(h=>({...h}));
let obBudget = '';
let obToken = '';
let obEditIdx = null;
let obEditLabel = '';
let obEditEmoji = '';

function renderOb() {
  const card = document.getElementById('ob-card');
  if (obStep===0) {
    card.innerHTML = `
      <div class="ob-eyebrow">Welcome</div>
      <div class="ob-title">What should we<br>call you?</div>
      <div class="ob-sub">We'll personalise your weekly check-ins.</div>
      <div class="field-wrap">
        <input type="text" class="field-input" id="ob-name" placeholder="Your name" autocomplete="given-name"/>
      </div>
      <button class="btn btn-primary" id="ob-next1" onclick="obNext1()" disabled>Continue →</button>
    `;
    const inp = document.getElementById('ob-name');
    inp.focus();
    inp.addEventListener('input', e => {
      obName = e.target.value.trim();
      document.getElementById('ob-next1').disabled = !obName;
    });
    inp.addEventListener('keydown', e => { if(e.key==='Enter'&&obName) obNext1(); });
  } else if (obStep===1 && obEditIdx===null) {
    card.innerHTML = `
      <div class="ob-eyebrow">Step 2 of 3</div>
      <div class="ob-title">Make it yours</div>
      <div class="ob-sub">Tap any habit to rename it. Totally optional.</div>
      ${obHabits.map((h,i)=>`
        <div class="ob-habit-row" onclick="obStartEdit(${i})">
          <span class="ob-habit-emoji">${h.emoji}</span>
          <div class="ob-habit-label">${h.label}</div>
          <div class="ob-habit-edit">Edit</div>
        </div>`).join('')}
      <button class="btn btn-primary" style="margin-top:8px" onclick="obStep=2;renderOb()">Continue →</button>
    `;
  } else if (obStep===1 && obEditIdx!==null) {
    card.innerHTML = `
      <div class="ob-eyebrow">Customise habit</div>
      <div class="ob-title">Rename it</div>
      <div class="field-wrap">
        <input type="text" class="field-input" id="ob-edit-inp" value="${obEditLabel}" placeholder="Habit name"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">Emoji</div>
        <div class="emoji-grid">${EMOJIS.map(em=>`<button class="emoji-opt${obEditEmoji===em?' sel':''}" onclick="obSetEmoji('${em}')">${em}</button>`).join('')}</div>
      </div>
      <button class="btn btn-primary" onclick="obSaveEdit()">Save</button>
    `;
    document.getElementById('ob-edit-inp').focus();
    document.getElementById('ob-edit-inp').addEventListener('input', e => { obEditLabel = e.target.value; });
  } else if (obStep===2) {
    card.innerHTML = `
      <div class="ob-eyebrow">Step 3 of 3</div>
      <div class="ob-title">Spending goal 💳</div>
      <div class="ob-sub">Set your weekly budget. Connect Up Bank to sync your spend automatically.</div>
      <div class="field-wrap">
        <div class="field-label">Weekly budget</div>
        <div class="prefix-row">
          <span class="prefix-sign">$</span>
          <input type="number" class="prefix-input" id="ob-budget" placeholder="500" value="${obBudget}"/>
        </div>
      </div>
      <div class="field-wrap">
        <div class="field-label">Up Bank token <span style="color:#c0b8b0;font-weight:400;text-transform:none;letter-spacing:0;font-size:12px">(optional)</span></div>
        <input type="password" class="field-input" id="ob-token" placeholder="up:yeah:••••••••" value="${obToken}"/>
        <div style="font-size:12px;color:#8a8078;margin-top:6px;line-height:1.5">Up app → Settings → API → Create token</div>
      </div>
      <button class="btn btn-primary" id="ob-finish" onclick="obFinish()" ${!obBudget?'disabled':''}>Let's go →</button>
      <button class="btn btn-ghost" onclick="obSkip()">Skip for now</button>
    `;
    const bi = document.getElementById('ob-budget');
    bi.addEventListener('input', e => {
      obBudget = e.target.value;
      document.getElementById('ob-finish').disabled = !obBudget;
    });
    document.getElementById('ob-token').addEventListener('input', e => { obToken = e.target.value; });
  }
}

function obNext1() { obStep=1; renderOb(); }
function obStartEdit(i) { obEditIdx=i; obEditLabel=obHabits[i].label; obEditEmoji=obHabits[i].emoji; renderOb(); }
function obSetEmoji(em) { obEditEmoji=em; renderOb(); }
function obSaveEdit() {
  if (obEditIdx!==null) { obHabits[obEditIdx]={...obHabits[obEditIdx],label:obEditLabel||obHabits[obEditIdx].label,emoji:obEditEmoji}; }
  obEditIdx=null; renderOb();
}
function obFinish() {
  obBudget = document.getElementById('ob-budget').value || '500';
  obToken  = document.getElementById('ob-token').value.trim();
  initState(obName, obHabits, parseFloat(obBudget)||500, obToken);
}
function obSkip() { initState(obName, obHabits, 500, ''); }

function initState(name, habits, budget, upToken) {
  state = { userName:name, habits, data:{}, celebrated:{}, budget, upToken };
  saveState();
  document.getElementById('ob-wrap').style.display='none';
  document.getElementById('app').style.display='block';
  bootApp();
}

// ══════════════════════════════════════════════════════════════════════════════
// APP BOOT
// ══════════════════════════════════════════════════════════════════════════════
function getNextWeekKey() {
  // Returns next Monday's date key (upcoming week to track)
  const now = new Date(); now.setHours(0,0,0,0);
  const thisMon = new Date(now); thisMon.setDate(now.getDate() - ((now.getDay()+6)%7));
  const nextMon = new Date(thisMon); nextMon.setDate(thisMon.getDate()+7);
  return nextMon.toISOString().slice(0,10);
}

function bootApp() {
  // First boot: show next week so user starts fresh on Monday
  const hasPriorData = Object.keys(state.data).length > 0;
  currentWeek = hasPriorData ? getWeekKey() : getNextWeekKey();
  renderAll();
  if (state.upToken) fetchUpSpend();
}

function renderAll() {
  const firstName = state.userName.split(' ')[0];
  const dl = daysLeft();
  const isNow = currentWeek === getWeekKey();

  // Greeting
  document.getElementById('greeting-name').textContent = `Hey, ${firstName} 👋`;
  document.getElementById('greeting-sub').textContent = isNow
    ? (dl===0 ? 'Last day of the week' : `${dl} day${dl!==1?'s':''} left`)
    : fmtRange(currentWeek);

  // Week nav
  document.getElementById('wk-label').textContent = fmtRange(currentWeek);
  document.getElementById('wk-sub').textContent = isNow ? 'This week' : '';
  document.getElementById('wk-next').disabled = isNow;

  if (currentTab==='weekly') renderWeekly();
  else renderHistory();
}

function renderWeekly() {
  renderNudge();
  renderProgress();
  renderDayStrip();
  renderHabits();
  renderMemory();
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER WEEKLY
// ══════════════════════════════════════════════════════════════════════════════
function renderNudge() {
  const isNow = currentWeek===getWeekKey();
  const dl = daysLeft();
  const rem = state.habits.length - totalDone();
  const wrap = document.getElementById('nudge-wrap');
  if (isNow && rem>0 && dl<=2) {
    wrap.innerHTML = `
      <div class="nudge fade-up">
        <div>
          <div class="nudge-text">Don't break your streak!</div>
          <div class="nudge-sub">${rem} habit${rem!==1?'s':''} still to log</div>
        </div>
        <div class="nudge-badge">
          <div class="nudge-badge-num">${dl}</div>
          <div class="nudge-badge-label">day${dl!==1?'s':''} left</div>
        </div>
      </div>`;
  } else { wrap.innerHTML=''; }
}

function renderProgress() {
  const done = totalDone();
  const total = state.habits.length;
  const pct = (done/total)*100;
  document.getElementById('prog-num').textContent = done;
  document.getElementById('prog-denom').textContent = `/${total}`;
  document.getElementById('prog-fill').style.width = pct+'%';
  const statuses = ['Not started','Getting going','Halfway','Almost there','Almost there','Almost there','Complete ✦'];
  document.getElementById('prog-status').textContent = done===total ? 'Complete ✦' : statuses[Math.min(done,3)];
}

function renderDayStrip() {
  const dates = weekDates(currentWeek);
  const today = new Date(); today.setHours(0,0,0,0);
  const done = totalDone();
  document.getElementById('day-strip').innerHTML = dates.map((d,i) => {
    const isToday = d.getTime()===today.getTime();
    return `<div class="day-cell${isToday?' today':''}">
      <div class="day-letter">${DAY_LETTERS[i]}</div>
      <div class="day-num">${d.getDate()}</div>
      <div class="day-dot${isToday&&done>0?' vis':''}"></div>
    </div>`;
  }).join('');
}

function renderHabits() {
  const stack = document.getElementById('habit-stack');
  stack.innerHTML = state.habits.map(h => renderHabitCard(h)).join('');
}

function renderHabitCard(h) {
  const done = isHabitDone(h.id);
  const streak = getStreak(h.id);
  const streakHtml = streak>0 ? `<span class="streak">🔥 ${streak}w</span> · ` : '';

  if (h.type==='nights') {
    const ns = getNights();
    const target = h.target||3;
    const hit = ns.length>=target;
    const readEntry = getEntry('reading');
    const book = readEntry.book || '';
    const rating = readEntry.rating || 0;
    const daysHtml = DAY_LETTERS.map((l,i) =>
      `<button class="night-btn${ns.includes(i)?' on':''}" onclick="toggleNight(${i})">${l}</button>`
    ).join('');
    const starsHtml = [1,2,3,4,5].map(n =>
      `<button class="star-btn${rating>=n?' lit':''}" onclick="rateReading(${n})">★</button>`
    ).join('');
    const bookHtml = book
      ? `<div class="reading-book" onclick="openReadingLog()">
          <span class="reading-book-emoji">📖</span>
          <span class="reading-book-title">${book}</span>
          <span class="reading-book-edit">Edit</span>
        </div>`
      : `<div class="reading-book reading-book-empty" onclick="openReadingLog()">
          <span class="reading-book-emoji">📖</span>
          <span class="reading-book-title" style="color:#c0b8b0">+ What are you reading?</span>
        </div>`;
    return `<div class="hcard${hit?' done':''}">
      <div class="hcard-top">
        <div class="hcard-emoji">${h.emoji}</div>
        <div class="hcard-info">
          <div class="hcard-name">
            <span class="hcard-name-text">${h.label}</span>
            <button class="edit-habit-btn" onclick="openEditHabit('${h.id}')">✎</button>
          </div>
          <div class="hcard-sub">${streakHtml}${target} nights/week</div>
        </div>
        <div class="check-btn${hit?' checked':''}" style="pointer-events:none">
          <svg class="check-icon" width="14" height="11" viewBox="0 0 14 11" fill="none">
            <path d="M1.5 5.5L5.5 9.5L12.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="nights-wrap">
        ${bookHtml}
        <div class="nights-grid" style="margin-top:10px">${daysHtml}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
          <div class="nights-count"><span>${ns.length}</span>/${target} nights${hit?' ✦ Done!':''}</div>
          <div class="stars-row">${starsHtml}</div>
        </div>
      </div>
    </div>`;
  }

  if (h.type==='spending') {
    const spendData = getEntry(h.id);
    const amt = upSpend!==null ? upSpend : (spendData.manualAmount ?? null);
    const over = amt!==null && amt>state.budget;
    const warn = amt!==null && !over && amt>=state.budget*0.85;
    const cls = over?'over':warn?'warn':'ok';
    const pct = amt!==null ? Math.min((amt/state.budget)*100,100) : 0;

    let spendBodyHtml = '';
    if (upLoading) {
      spendBodyHtml = '<div style="font-size:13px;color:#b0a898;font-style:italic;padding:4px 0">Syncing with Up Bank…</div>';
    } else if (upError) {
      spendBodyHtml = `<div style="font-size:13px;color:#c05050;margin-bottom:10px">⚠️ ${upError}</div>`;
      spendBodyHtml += `<div class="spend-manual">
        <input type="number" id="spend-manual-inp" placeholder="Enter spend manually"/>
        <button onclick="saveManualSpend()">Save</button>
      </div>`;
    } else if (amt!==null) {
      spendBodyHtml = `
        <div class="spend-amt-row">
          <div class="spend-amt ${cls}">$${amt.toFixed(0)}</div>
          <div class="spend-budget">/ $${state.budget}</div>
          ${state.upToken ? '<div class="spend-via">via Up Bank ↗</div>' : ''}
        </div>
        <div class="spend-bar-track"><div class="spend-bar-fill ${over?'over':'ok'}" style="width:${pct}%"></div></div>
        <div class="spend-status ${cls}">${over ? '$'+((amt-state.budget).toFixed(0))+' over budget' : done ? '$'+((state.budget-amt).toFixed(0))+' under — on track ✦' : '$'+((state.budget-amt).toFixed(0))+' remaining'}</div>
        ${!state.upToken ? '<div class="spend-manual" style="margin-top:10px"><input type="number" id="spend-manual-inp" placeholder="Update amount"/><button onclick="saveManualSpend()">Update</button></div>' : ''}
      `;
    } else if (!state.upToken) {
      spendBodyHtml = `
        <div style="font-size:13px;color:#8a8078;margin-bottom:12px;line-height:1.5">Connect Up Bank to sync automatically, or enter manually below.</div>
        <div class="spend-manual">
          <input type="number" id="spend-manual-inp" placeholder="This week's spend"/>
          <button onclick="saveManualSpend()">Save</button>
        </div>
        <button onclick="openSheet('settings-sheet')" style="margin-top:10px;background:none;border:1.5px solid #e0d8d0;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;color:#9b7fa6;cursor:pointer;width:100%">Connect Up Bank →</button>
      `;
    } else {
      spendBodyHtml = '<div style="font-size:13px;color:#b0a898;font-style:italic">Waiting for settled transactions…</div>';
    }

    return '<div class="hcard' + (done?' done':'') + '">' +
      '<div class="hcard-top">' +
        '<div class="hcard-emoji">' + h.emoji + '</div>' +
        '<div class="hcard-info">' +
          '<div class="hcard-name">' +
            '<span class="hcard-name-text">' + h.label + '</span>' +
            '<button class="edit-habit-btn" onclick="openEditHabit(\'' + h.id + '\')">✎</button>' +
          '</div>' +
          '<div class="hcard-sub">' + streakHtml + 'Goal: $' + state.budget + '/wk</div>' +
        '</div>' +
        '<div class="check-btn' + (done?' checked':'') + '" style="pointer-events:none">' +
          '<svg class="check-icon" width="14" height="11" viewBox="0 0 14 11" fill="none">' +
            '<path d="M1.5 5.5L5.5 9.5L12.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>' +
          '</svg>' +
        '</div>' +
      '</div>' +
      '<div class="spend-wrap">' + spendBodyHtml + '</div>' +
    '</div>';
  }

  // Standard
  const entry = getEntry(h.id);
  const note = entry.note;
  const bottomHtml = note
    ? `<div class="hcard-note-text">"${note}"</div><div class="hcard-note-action">${h.isDate?'History →':'Edit'}</div>`
    : `<div class="hcard-note-add">+ ${h.prompt}</div>`;

  return `<div class="hcard${done?' done':''}">
    <div class="hcard-top">
      <div class="hcard-emoji">${h.emoji}</div>
      <div class="hcard-info">
        <div class="hcard-name">
          <span class="hcard-name-text">${h.label}</span>
          <button class="edit-habit-btn" onclick="openEditHabit('${h.id}')">✎</button>
        </div>
        <div class="hcard-sub">${streakHtml}${h.prompt}</div>
      </div>
      <div class="check-btn${done?' checked':''}" onclick="toggleHabit('${h.id}')">
        <svg class="check-icon" width="14" height="11" viewBox="0 0 14 11" fill="none">
          <path d="M1.5 5.5L5.5 9.5L12.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="hcard-bottom" onclick="${h.isDate||h.id==='reading'||h.id==='career'?`openTimeline('${h.id}')`:`openLog('${h.id}')`}">
      ${bottomHtml}
    </div>
  </div>`;
}

function renderMemory() {
  const lastMonth = offsetWeek(getWeekKey(), -4);
  const memos = state.habits
    .filter(h => h.type!=='spending'&&h.type!=='nights')
    .map(h => ({...h, note: (state.data[`${lastMonth}:${h.id}`]||{}).note}))
    .filter(h => h.note);
  const wrap = document.getElementById('memory-wrap');
  if (!memos.length) { wrap.innerHTML=''; return; }
  wrap.innerHTML = `
    <div class="section-label">This time last month</div>
    <div class="memory-card fade-up">
      ${memos.map(h=>`
        <div class="memory-item">
          <span class="memory-emoji">${h.emoji}</span>
          <div class="memory-text"><span class="memory-habit">${h.label}:</span> ${h.note}</div>
        </div>`).join('')}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER HISTORY
// ══════════════════════════════════════════════════════════════════════════════
function renderHistory() {
  const thisWeek = getWeekKey();
  const histWeeks = Array.from({length:12}, (_,i)=>offsetWeek(thisWeek,-i));
  const perfectCount = histWeeks.filter(wk=>totalDone(wk)===state.habits.length).length;
  const bestStreak = Math.max(...state.habits.map(h=>getStreak(h.id)), 0);
  const totalCount = Object.keys(state.data).filter(k=>state.data[k]?.done).length;

  document.getElementById('stat-strip').innerHTML = [
    {val:perfectCount, lbl:'Perfect weeks'},
    {val:bestStreak,   lbl:'Best streak'},
    {val:totalCount,   lbl:'Total done'},
  ].map(s=>`<div class="stat-card">
    <div class="stat-val">${s.val}</div>
    <div class="stat-lbl">${s.lbl}</div>
  </div>`).join('');

  document.getElementById('hist-list').innerHTML = histWeeks.map(wk => {
    const score = totalDone(wk);
    const perfect = score===state.habits.length;
    const pips = state.habits.map(h => {
      const done = isHabitDone(h.id,wk);
      return `<div class="hist-pip${done?(perfect?' perfect':' done'):''}">${done?h.emoji:''}</div>`;
    }).join('');
    return `<div class="hist-row${wk===currentWeek?' current':''}" onclick="jumpToWeek('${wk}')">
      <div class="hist-date">${fmtRange(wk)}</div>
      <div class="hist-pips">${pips}</div>
      <div class="hist-score${perfect?' full':''}">${score}/${state.habits.length}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════════════════════════
function toggleHabit(id) {
  const k = `${currentWeek}:${id}`;
  const cur = state.data[k] || {};
  state.data[k] = {...cur, done: !cur.done};
  saveState();
  const done = totalDone();
  if (done===state.habits.length && !state.celebrated[currentWeek]) {
    state.celebrated[currentWeek] = true;
    saveState();
    celebrate();
  }
  renderWeekly();
}

function toggleNight(i) {
  const k = `${currentWeek}:reading:nights`;
  const cur = state.data[k] || [];
  state.data[k] = cur.includes(i) ? cur.filter(d=>d!==i) : [...cur,i];
  saveState();
  const ns = state.data[k];
  const target = (state.habits.find(h=>h.id==='reading')||{}).target||3;
  const done = totalDone();
  if (ns.length>=target && done===state.habits.length && !state.celebrated[currentWeek]) {
    state.celebrated[currentWeek]=true; saveState(); celebrate();
  }
  renderWeekly();
}

function saveManualSpend() {
  const inp = document.getElementById('spend-manual-inp');
  const amt = parseFloat(inp.value);
  if (isNaN(amt)) return;
  const k = `${currentWeek}:spending`;
  state.data[k] = {done: amt<=state.budget, manualAmount: amt};
  saveState(); inp.value='';
  const done = totalDone();
  if (done===state.habits.length && !state.celebrated[currentWeek]) {
    state.celebrated[currentWeek]=true; saveState(); celebrate();
  }
  renderWeekly();
}

function changeWeek(dir) {
  currentWeek = offsetWeek(currentWeek, dir);
  upSpend = null;
  if (currentWeek!==getWeekKey() || !state.upToken) {}
  else if (state.upToken) fetchUpSpend();
  renderAll();
}

function jumpToWeek(wk) {
  currentWeek = wk;
  switchTab('weekly');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('screen-weekly').classList.toggle('active', tab==='weekly');
  document.getElementById('screen-history').classList.toggle('active', tab==='history');
  document.getElementById('tab-weekly').classList.toggle('active', tab==='weekly');
  document.getElementById('tab-history').classList.toggle('active', tab==='history');
  renderAll();
}

// LOG SHEET
// ══════════════════════════════════════════════════════════════════════════════
function openLog(id) {
  loggingId = id;
  const h = state.habits.find(x=>x.id===id);
  const e = getEntry(id);
  const header = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
    <span style="font-size:26px">${h.emoji}</span>
    <div class="sheet-title">${h.label}</div>
  </div>`;

  let body = '';
  if (id === 'date') {
    body = `
      <div class="sheet-sub" style="margin-bottom:20px">Log your date details</div>
      <div class="field-wrap">
        <div class="field-label">Who with</div>
        <input type="text" class="field-input" id="log-who" placeholder="e.g. James" value="${e.who||''}"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">Where</div>
        <input type="text" class="field-input" id="log-where" placeholder="e.g. Ester, Newtown" value="${e.where||''}"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">Notes <span style="color:#c0b8b0;font-weight:400;text-transform:none;letter-spacing:0;font-size:12px">(optional)</span></div>
        <textarea class="field-input" id="log-note" placeholder="How was it?" rows="2">${e.note||''}</textarea>
      </div>`;
  } else if (id === 'career') {
    body = `
      <div class="sheet-sub" style="margin-bottom:20px">Log your conversation</div>
      <div class="field-wrap">
        <div class="field-label">Who</div>
        <input type="text" class="field-input" id="log-who" placeholder="e.g. Sarah Chen, Google" value="${e.who||''}"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">What did you discuss</div>
        <input type="text" class="field-input" id="log-topic" placeholder="e.g. Product strategy, new role" value="${e.topic||''}"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">Notes <span style="color:#c0b8b0;font-weight:400;text-transform:none;letter-spacing:0;font-size:12px">(optional)</span></div>
        <textarea class="field-input" id="log-note" placeholder="Key takeaways…" rows="2">${e.note||''}</textarea>
      </div>`;
  } else {
    body = `
      <div class="sheet-sub" style="margin-bottom:20px">${h.prompt}</div>
      <div class="field-wrap">
        <textarea class="field-input" id="log-note" placeholder="Add details…" rows="3">${e.note||''}</textarea>
      </div>`;
  }

  document.getElementById('log-sheet-content').innerHTML = header + body + `
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn-sm btn-sm-ghost" onclick="closeSheet('log-sheet')">Cancel</button>
      <button class="btn-sm btn-sm-primary" style="flex:1" onclick="saveLog()">Save</button>
    </div>`;

  openSheet('log-sheet');
  setTimeout(() => {
    const first = document.querySelector('#log-sheet-content input, #log-sheet-content textarea');
    if (first) first.focus();
  }, 350);
}

function saveLog() {
  if (!loggingId) return;
  const k = `${currentWeek}:${loggingId}`;
  const cur = state.data[k] || {};
  if (loggingId === 'date') {
    const who   = (document.getElementById('log-who')||{}).value||'';
    const where = (document.getElementById('log-where')||{}).value||'';
    const note  = (document.getElementById('log-note')||{}).value||'';
    state.data[k] = {...cur, who: who.trim(), where: where.trim(), note: note.trim()};
  } else if (loggingId === 'career') {
    const who   = (document.getElementById('log-who')||{}).value||'';
    const topic = (document.getElementById('log-topic')||{}).value||'';
    const note  = (document.getElementById('log-note')||{}).value||'';
    state.data[k] = {...cur, who: who.trim(), topic: topic.trim(), note: note.trim()};
  } else if (loggingId === 'reading') {
    const book = (document.getElementById('log-book')||{}).value||'';
    const note = (document.getElementById('log-note')||{}).value||'';
    const rating = _logRating || cur.rating || 0;
    state.data[k] = {...cur, book: book.trim(), note: note.trim(), rating};
    _logRating = 0;
  } else {
    const note = (document.getElementById('log-note')||{}).value||'';
    state.data[k] = {...cur, note: note.trim()};
  }
  saveState();
  loggingId = null;
  closeSheet('log-sheet');
  renderWeekly();
}

// ══════════════════════════════════════════════════════════════════════════════
// TIMELINE SHEET
// ══════════════════════════════════════════════════════════════════════════════
let timelineId = null;
function openTimeline(id) {
  timelineId = id;
  const h = state.habits.find(x=>x.id===id);
  document.getElementById('tl-title').textContent = `${h.emoji} ${h.label}`;
  const thisWeek = getWeekKey();
  const histWeeks = Array.from({length:12},(_,i)=>offsetWeek(thisWeek,-i));
  const doneWeeks = histWeeks.filter(wk=>isHabitDone(id,wk));
  document.getElementById('tl-list').innerHTML = doneWeeks.length===0
    ? '<div style="text-align:center;padding:40px 0;color:#c0b8b0;font-size:14px;font-weight:600">Nothing logged yet</div>'
    : doneWeeks.map(wk=>{
        const e = state.data[`${wk}:${id}`]||{};
        let inner = '';
        if (id==='date') {
          inner = [
            e.who   ? `<div class="tl-field"><span class="tl-flabel">With</span> ${e.who}</div>` : '',
            e.where ? `<div class="tl-field"><span class="tl-flabel">Where</span> ${e.where}</div>` : '',
            e.note  ? `<div class="tl-field"><span class="tl-flabel">Notes</span> ${e.note}</div>` : '',
          ].filter(Boolean).join('') || '<div class="tl-empty">No details logged</div>';
        } else if (id==='career') {
          inner = [
            e.who   ? `<div class="tl-field"><span class="tl-flabel">Who</span> ${e.who}</div>` : '',
            e.topic ? `<div class="tl-field"><span class="tl-flabel">Topic</span> ${e.topic}</div>` : '',
            e.note  ? `<div class="tl-field"><span class="tl-flabel">Notes</span> ${e.note}</div>` : '',
          ].filter(Boolean).join('') || '<div class="tl-empty">No details logged</div>';
        } else if (id==='reading') {
          const stars = e.rating ? '★'.repeat(e.rating)+'☆'.repeat(5-e.rating) : '';
          inner = [
            e.book   ? `<div class="tl-field"><span class="tl-flabel">Book</span> ${e.book}</div>` : '',
            e.rating ? `<div class="tl-field"><span class="tl-flabel">Rating</span> <span style="color:#f0a030">${stars}</span></div>` : '',
            e.note   ? `<div class="tl-field"><span class="tl-flabel">Thoughts</span> ${e.note}</div>` : '',
          ].filter(Boolean).join('') || '<div class="tl-empty">No details logged</div>';
        } else {
          inner = e.note ? `<div class="tl-note">"${e.note}"</div>` : '<div class="tl-empty">No details logged</div>';
        }
        return `<div class="tl-item">
          <div class="tl-dot"></div>
          <div class="tl-card">
            <div class="tl-week">${fmtRange(wk)}</div>
            ${inner}
          </div>
        </div>`;
      }).join('');
  openSheet('timeline-sheet');
}

function openLogFromTimeline() {
  closeSheet('timeline-sheet');
  setTimeout(()=>{
    if (timelineId==='reading') openReadingLog();
    else openLog(timelineId);
  }, 300);
}

// ══════════════════════════════════════════════════════════════════════════════
// EDIT HABIT SHEET
// ══════════════════════════════════════════════════════════════════════════════
function openEditHabit(id) {
  editingId = id;
  const h = state.habits.find(x=>x.id===id);
  document.getElementById('edit-label-input').value = h.label;
  document.getElementById('edit-emoji-grid').innerHTML = EMOJIS.map(em=>
    `<button class="emoji-opt${h.emoji===em?' sel':''}" onclick="selectEditEmoji('${em}')">${em}</button>`
  ).join('');
  openSheet('edit-sheet');
  setTimeout(()=>document.getElementById('edit-label-input').focus(), 350);
}

function selectEditEmoji(em) {
  document.querySelectorAll('#edit-emoji-grid .emoji-opt').forEach(b => b.classList.remove('sel'));
  event.target.classList.add('sel');
}

function saveEditHabit() {
  if (!editingId) return;
  const label = document.getElementById('edit-label-input').value.trim();
  const sel = document.querySelector('#edit-emoji-grid .emoji-opt.sel');
  const emoji = sel ? sel.textContent : state.habits.find(h=>h.id===editingId).emoji;
  state.habits = state.habits.map(h => h.id===editingId ? {...h,label:label||h.label,emoji} : h);
  saveState();
  editingId = null;
  closeSheet('edit-sheet');
  renderWeekly();
}

// ══════════════════════════════════════════════════════════════════════════════
// SETTINGS SHEET
// ══════════════════════════════════════════════════════════════════════════════
function openSheet(id) {
  // Populate settings when opening
  if (id==='settings-sheet') {
    document.getElementById('settings-name').value = state.userName;
    document.getElementById('settings-budget').value = state.budget;
    document.getElementById('settings-token').value = state.upToken||'';
  }
  const el = document.getElementById(id);
  el.classList.add('open');
  document.body.style.overflow='hidden';
}

function closeSheet(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow='';
}

function handleOverlayClick(e, id) {
  if (e.target===document.getElementById(id)) closeSheet(id);
}

function saveSettings() {
  const name = document.getElementById('settings-name').value.trim();
  const budget = parseFloat(document.getElementById('settings-budget').value)||500;
  const token = document.getElementById('settings-token').value.trim();
  if (name) state.userName = name;
  state.budget = budget;
  state.upToken = token;
  saveState();
  closeSheet('settings-sheet');
  if (token) fetchUpSpend();
  renderAll();
}

// ══════════════════════════════════════════════════════════════════════════════
// UP BANK
// ══════════════════════════════════════════════════════════════════════════════
let upLoading = false;
let upError = null;

function fetchUpSpend() {
  if (!state.upToken) return;
  upLoading = true; upError = null;
  if (currentTab==='weekly') renderHabits();
  fetch(`/.netlify/functions/up-spend?weekKey=${currentWeek}`, {
    headers: {Authorization:`Bearer ${state.upToken}`}
  })
  .then(r => { if(!r.ok) throw new Error('Up API error ' + r.status); return r.json(); })
  .then(j => {
    upSpend = j.total; upLoading = false; upError = null;
    const k = `${currentWeek}:spending`;
    state.data[k] = {...(state.data[k]||{}), done: upSpend<=state.budget, autoAmount:upSpend};
    saveState();
    if (currentTab==='weekly') renderHabits();
  })
  .catch(e => {
    upLoading = false;
    upError = e.message || 'Could not connect to Up';
    upSpend = null;
    if (currentTab==='weekly') renderHabits();
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// CELEBRATION
// ══════════════════════════════════════════════════════════════════════════════
function celebrate() {
  const firstName = state.userName.split(' ')[0];
  const toast = document.getElementById('celebrate-toast');
  document.getElementById('celebrate-title').textContent = `Perfect week, ${firstName}!`;
  document.getElementById('celebrate-sub').textContent = `All ${state.habits.length} habits done.`;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 3000);
  launchConfetti();
}

function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colours = ['#9b7fa6','#b89cc8','#d4b8e8','#e8d0f0','#7d6289','#c4a0d4'];
  for (let i=0;i<60;i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = Math.random()*8+4;
    el.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px;height:${size*1.5}px;
      background:${colours[i%colours.length]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation:confetti-fall ${0.8+Math.random()*1}s linear ${Math.random()*0.6}s both;
    `;
    wrap.appendChild(el);
  }
  setTimeout(()=>{ wrap.innerHTML=''; }, 3000);
}


// ══════════════════════════════════════════════════════════════════════════════
// READING LOG
// ══════════════════════════════════════════════════════════════════════════════
function openReadingLog() {
  loggingId = 'reading';
  const e = getEntry('reading');
  const rating = e.rating || 0;
  const starsHtml = [1,2,3,4,5].map(n =>
    `<button class="star-btn${rating>=n?' lit':''}" id="rlog-star-${n}" onclick="setLogRating(${n})"style="font-size:28px;padding:4px">★</button>`
  ).join('');
  document.getElementById('log-sheet-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
      <span style="font-size:26px">📚</span>
      <div class="sheet-title">Reading</div>
    </div>
    <div class="sheet-sub" style="margin-bottom:20px">Log this week's reading</div>
    <div class="field-wrap">
      <div class="field-label">Book</div>
      <input type="text" class="field-input" id="log-book" placeholder="e.g. Atomic Habits" value="${e.book||''}"/>
    </div>
    <div class="field-wrap">
      <div class="field-label">Rating <span style="color:#c0b8b0;font-weight:400;text-transform:none;letter-spacing:0;font-size:12px">(optional)</span></div>
      <div style="display:flex;gap:4px;margin-bottom:4px">${starsHtml}</div>
    </div>
    <div class="field-wrap">
      <div class="field-label">Thoughts <span style="color:#c0b8b0;font-weight:400;text-transform:none;letter-spacing:0;font-size:12px">(optional)</span></div>
      <textarea class="field-input" id="log-note" placeholder="What did you think?" rows="2">${e.note||''}</textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn-sm btn-sm-ghost" onclick="closeSheet('log-sheet')">Cancel</button>
      <button class="btn-sm btn-sm-primary" style="flex:1" onclick="saveLog()">Save</button>
    </div>`;
  openSheet('log-sheet');
  setTimeout(() => document.getElementById('log-book')?.focus(), 350);
}

let _logRating = 0;
function setLogRating(n) {
  _logRating = n;
  [1,2,3,4,5].forEach(i => {
    const b = document.getElementById('rlog-star-'+i);
    if (b) b.classList.toggle('lit', i<=n);
  });
}

function rateReading(n) {
  const k = `${currentWeek}:reading`;
  state.data[k] = {...(state.data[k]||{}), rating: n};
  saveState();
  renderHabits();
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
(function init() {
  state = loadState();
  if (state && state.userName) {
    document.getElementById('ob-wrap').style.display='none';
    document.getElementById('app').style.display='block';
    bootApp();
  } else {
    renderOb();
  }
})();
</script>
